<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答案構成ドリル　完全版｜基本7法・全35事例</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --blue-deep:#0f2438;
    --blue-mid:#1c3d5e;
    --blue-line:#3a6690;
    --paper:#f4f7f9;
    --grid:#dfe9ef;
    --ink:#132433;
    --copper:#c17a3f;
    --copper-dark:#9c5f2c;
    --ok:#2f6b52;
    --ng:#a8323a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(var(--blue-deep), var(--blue-mid));
    font-family:"Noto Sans JP",sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:30px 14px 70px;
  }

  .app-header{ text-align:center; color:#dce8f2; margin-bottom:22px; }
  .app-header .eyebrow{
    font-family:"JetBrains Mono",monospace;
    font-size:.66rem; letter-spacing:.3em; color:var(--copper); margin-bottom:10px;
  }
  .app-header h1{ font-family:"Shippori Mincho",serif; font-size:1.45rem; margin:0 0 8px; font-weight:700; }
  .app-header p{ font-size:.8rem; color:#a9c1d4; margin:0 auto; max-width:480px; line-height:1.7; }

  .app-wrap{ max-width:680px; margin:0 auto; }

  .stats-bar{
    display:flex; justify-content:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;
  }
  .stats-chip{
    background:rgba(255,255,255,.08); color:#cfe0ee; border:1px solid rgba(255,255,255,.2);
    font-family:"JetBrains Mono",monospace; font-size:.72rem; padding:5px 12px; border-radius:14px;
  }

  .subject-group{ margin-bottom:22px; }
  .subject-group-head{
    display:flex; align-items:center; gap:10px; margin-bottom:10px; padding-left:2px;
  }
  .subject-group-head .sg-icon{
    width:26px; height:26px; border-radius:50%; background:var(--copper); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:"JetBrains Mono",monospace;
    font-size:.72rem; font-weight:700; flex-shrink:0;
  }
  .subject-group-head h3{
    font-family:"Shippori Mincho",serif; font-size:1.02rem; color:#e8f0f6; margin:0; font-weight:700;
  }
  .subject-group-head .sg-count{
    font-family:"JetBrains Mono",monospace; font-size:.68rem; color:#8fa8bd;
  }

  .problem-menu{ display:grid; gap:10px; }
  .problem-card{
    background:var(--paper);
    background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:14px 14px;
    border:2px solid var(--blue-line);
    border-radius:4px;
    padding:14px 16px;
    cursor:pointer;
    display:flex; align-items:center; gap:12px;
    transition:transform .12s, box-shadow .12s;
    position:relative;
  }
  .problem-card:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,.35); }
  .problem-card .p-num{
    font-family:"JetBrains Mono",monospace; font-size:1.1rem; font-weight:700; color:var(--copper);
    flex-shrink:0; width:30px; text-align:center;
  }
  .problem-card .p-info{ flex:1; min-width:0; }
  .problem-card .p-title{ font-family:"Shippori Mincho",serif; font-size:.95rem; font-weight:700; margin-bottom:3px; }
  .problem-card .p-desc{ font-size:.76rem; color:#4a5a68; line-height:1.55; }
  .problem-card .done-badge{
    position:absolute; top:10px; right:10px; background:var(--ok); color:#fff;
    font-family:"JetBrains Mono",monospace; font-size:.6rem; font-weight:700;
    padding:2px 7px; border-radius:10px; display:none;
  }
  .problem-card.done .done-badge{ display:block; }

  /* ===== 組み立てボード ===== */
  .board{
    background:var(--paper);
    background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:14px 14px;
    border:2px solid var(--blue-line);
    border-radius:4px;
    padding:22px 22px 26px;
  }
  .back-link{
    display:inline-block; font-family:"JetBrains Mono",monospace; font-size:.72rem;
    color:var(--copper-dark); text-decoration:none; margin-bottom:14px; cursor:pointer;
    border:none; background:none; padding:0;
  }
  .back-link:hover{ text-decoration:underline; }
  .board-head{
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:2px solid var(--blue-deep); padding-bottom:12px; margin-bottom:18px;
  }
  .board-head .p-tag{ font-family:"JetBrains Mono",monospace; font-size:.68rem; color:var(--copper-dark); margin-bottom:4px; }
  .board-head h2{ font-family:"Shippori Mincho",serif; font-size:1.05rem; margin:0; }
  .timer{
    font-family:"JetBrains Mono",monospace; font-size:1rem; font-weight:700; color:var(--blue-deep);
    background:#fff; border:1.5px solid var(--blue-line); padding:5px 12px; border-radius:4px;
  }
  .fact-block{
    background:#fff; border:1.5px solid var(--blue-line); border-radius:4px;
    padding:14px 18px; font-size:.87rem; line-height:1.85; margin-bottom:20px;
  }
  .fact-block .fact-label{
    font-family:"JetBrains Mono",monospace; font-size:.66rem; color:var(--copper-dark);
    letter-spacing:.1em; margin-bottom:6px; display:block;
  }
  .blueprint{ margin-bottom:20px; }
  .bp-slot{
    border:2px dashed #b9c9d6; border-radius:4px; padding:12px 16px; margin-bottom:10px;
    font-size:.85rem; line-height:1.8; color:#8898a6; transition:all .3s;
  }
  .bp-slot .bp-label{
    font-family:"JetBrains Mono",monospace; font-size:.65rem; font-weight:700;
    letter-spacing:.1em; margin-bottom:4px; display:block; color:#8898a6;
  }
  .bp-slot.filled{ border:2px solid var(--ok); background:#eef6f1; color:var(--ink); animation:snapIn .3s ease; }
  .bp-slot.filled .bp-label{ color:var(--ok); }
  @keyframes snapIn{ 0%{transform:scale(.96);opacity:.4;} 60%{transform:scale(1.02);} 100%{transform:scale(1);opacity:1;} }
  .step-label{
    font-family:"JetBrains Mono",monospace; font-size:.7rem; letter-spacing:.12em;
    color:var(--copper); margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .step-label .step-num{
    background:var(--copper); color:#fff; width:20px; height:20px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; font-size:.7rem;
  }
  .step-instruction{ font-family:"Shippori Mincho",serif; font-size:1rem; font-weight:700; margin-bottom:14px; }
  .choices{ display:grid; gap:10px; margin-bottom:18px; }
  .choice-btn{
    text-align:left; background:#fff; border:1.5px solid var(--blue-line); border-radius:4px;
    padding:12px 14px; cursor:pointer; font-size:.82rem; line-height:1.7; color:var(--ink);
    transition:border-color .15s, box-shadow .15s, transform .1s;
  }
  .choice-btn:hover:not(:disabled){ border-color:var(--copper); box-shadow:0 3px 10px rgba(0,0,0,.1); transform:translateY(-1px); }
  .choice-btn:disabled{ cursor:default; }
  .choice-btn.correct{ border-color:var(--ok); background:#eef6f1; }
  .choice-btn.wrong{ border-color:var(--ng); background:#f9eeee; opacity:.7; }
  .hint-card{
    display:none; background:#f9eeee; border:1.5px dashed var(--ng); border-radius:4px;
    padding:12px 16px; margin-bottom:16px; font-size:.81rem; line-height:1.75;
  }
  .hint-card.show{ display:block; }
  .hint-card .hint-tag{
    display:inline-block; font-family:"JetBrains Mono",monospace; font-size:.64rem; font-weight:700;
    background:var(--ng); color:#fff; padding:2px 8px; border-radius:2px; margin-bottom:6px;
  }
  .complete-screen{ display:none; }
  .complete-screen.show{ display:block; }
  .complete-title{ font-family:"Shippori Mincho",serif; font-size:1.15rem; text-align:center; margin-bottom:6px; }
  .complete-time{ text-align:center; font-family:"JetBrains Mono",monospace; font-size:.83rem; color:var(--copper-dark); margin-bottom:20px; }
  .final-answer{ background:#fff; border:2px solid var(--ok); border-radius:4px; padding:18px 20px; margin-bottom:18px; }
  .final-answer .fa-slot{ margin-bottom:14px; font-size:.85rem; line-height:1.85; }
  .final-answer .fa-label{
    font-family:"JetBrains Mono",monospace; font-size:.66rem; font-weight:700; color:var(--ok);
    letter-spacing:.08em; margin-bottom:4px; display:block;
  }
  .next-btn{
    width:100%; background:var(--blue-deep); color:#dce8f2; border:none; border-radius:4px;
    padding:13px; font-family:"JetBrains Mono",monospace; font-size:.85rem; font-weight:700;
    letter-spacing:.05em; cursor:pointer; transition:background .15s;
  }
  .next-btn:hover{ background:#132c42; }
  .proto-note{ max-width:680px; margin:22px auto 0; color:#a9c1d4; font-size:.72rem; text-align:center; line-height:1.8; }

  @media(max-width:480px){
    .board{ padding:16px 14px 20px; }
    .app-header h1{ font-size:1.15rem; }
    .step-instruction{ font-size:.92rem; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="eyebrow">ANSWER BLUEPRINT DRILL ・ COMPLETE EDITION</div>
  <h1>答案構成ドリル　完全版</h1>
  <p>基本7法×各5事例、全35問。問題提起→規範定立→あてはめの3パーツを、正しく組み立てる練習帳です。</p>
</div>

<div class="app-wrap">
  <div class="stats-bar" id="statsBar"></div>
  <div id="mainArea"></div>
  <div class="proto-note">法学部・司法試験対策シリーズ｜内容は学習の便宜のため要約している部分があります。実際の答案作成では必ず基本書・判例集・答練の添削等で確認してください。</div>
</div>

<script>
(function(){
  "use strict";

  const SUBJECTS = [
    {
      name: "憲法", icon: "憲",
      problems: [
        {
          title: "私人間効力（三菱樹脂事件型）",
          desc: "企業の採用拒否と思想信条の自由の私人間適用。",
          facts: "企業Yは、入社試験の際に学生運動歴を秘匿していたことを理由に、採用内定を得ていたXの本採用を拒否した。Xは、これは思想信条の自由（憲法19条）を侵害する違法な取扱いであると主張した。",
          steps: [
            { instruction:"この事例で、まず何が問題になるかを正しく指摘しているのはどれか？",
              choices:[
                {text:"本件では、憲法19条の規定が、国家ではなく私人であるYとXとの関係に直接適用されるか（私人間効力）が問題となる。", correct:true},
                {text:"本件では、Yの採用内定通知が民法上の契約の申込みにあたるかが問題となる。", correct:false, hint:"契約の性質決定は本件の中心的争点ではありません。争点は「憲法上の人権規定が私人間の関係にどう及ぶか」です。"},
                {text:"本件では、Xの学生運動が公共の福祉に反するかが問題となる。", correct:false, hint:"公共の福祉による人権制約は国家対個人の場面で問題となる枠組みで、私人間の紛争である本件には直接あてはまりません。"}
              ]},
            { instruction:"問題提起に対応する規範として、最も適切なものはどれか？",
              choices:[
                {text:"憲法の人権規定は国又は公共団体と個人との関係を規律するものであり、私人相互の関係を直接規律するものではない。私人間における人権侵害的行為は、民法90条等の私法の一般条項の解釈を通じて間接的に規律されると解する（間接適用説）。", correct:true},
                {text:"憲法の人権規定は私人間にも直接適用されると解する。", correct:false, hint:"これは直接適用説であり、判例（三菱樹脂事件、最大判昭和48年12月12日）が採用した立場（間接適用説）と異なります。"},
                {text:"私人間の関係には憲法は一切関係しないと解する。", correct:false, hint:"これは無適用説に近い立場で、民法の一般条項を介して間接的に憲法の趣旨が及ぶという判例の理解とは異なります。"}
              ]},
            { instruction:"規範を本件の事実にあてはめる記述として、最も適切なものはどれか？",
              choices:[
                {text:"本問では、企業者は契約締結の自由の一環として広範な採用の自由を有し、労働者の思想・信条を理由として本採用を拒否したとしても、これが公序良俗（民法90条）に反する等の特段の事情がない限り、直ちに違法とはいえない。", correct:true},
                {text:"本問では、Yの行為は憲法19条に直接違反し無効である。", correct:false, hint:"間接適用説の規範を立てた以上、憲法違反を直接論じるのではなく、民法90条等の一般条項を介して判断する必要があります。規範とあてはめが対応していません。"},
                {text:"本問では、企業には採用の自由が一切認められないから、Yの行為は違法である。", correct:false, hint:"判例は企業の採用の自由を広く認めており、「採用の自由が一切ない」という前提は誤りです。"}
              ]}
          ]
        },
        {
          title: "職業選択の自由（薬事法型）",
          desc: "薬局の距離制限規制と規制目的二分論。",
          facts: "県は、薬局の乱立による過当競争が不良医薬品の供給につながることを防止する目的で、薬局開設に距離制限を課す条例を定めた。この条例により開設を不許可とされた事業者Xは、条例が憲法22条1項に違反すると主張した。",
          steps: [
            { instruction:"この事例で、まず何が問題になるかを正しく指摘しているのはどれか？",
              choices:[
                {text:"本件では、薬局開設の距離制限規制が、職業選択の自由（憲法22条1項）に対する必要かつ合理的な規制といえるかが問題となる。", correct:true},
                {text:"本件では、Xの財産権（憲法29条）が侵害されたかが問題となる。", correct:false, hint:"本件で問題となっている自由は「薬局を開設して営業する自由」であり、これは職業選択の自由（22条1項）の問題です。既存の財産の収用等の場面ではありません。"},
                {text:"本件では、条例が法律の委任なく制定されたかが問題となる。", correct:false, hint:"事例には条例制定手続の瑕疵は示されていません。争点は規制の実体的な合憲性です。"}
              ]},
            { instruction:"問題提起に対応する規範として、最も適切なものはどれか？",
              choices:[
                {text:"職業の許可制は職業選択の自由に対する強力な制限であり、重要な公共の利益のために必要かつ合理的な措置であることを要する。国民の生命・健康に対する危険防止を目的とする消極目的規制については、規制の必要性・合理性、より緩やかな規制手段の有無を審査すると解する。", correct:true},
                {text:"経済的自由に対する規制は、常に立法府の広い裁量に委ねられ、明白に不合理でない限り合憲であると解する。", correct:false, hint:"これは積極目的規制（社会経済政策目的）に妥当しやすい緩やかな基準であり、本件のような消極目的規制（生命・健康の危険防止目的）にはより厳格な審査（規範）が必要です。"},
                {text:"職業選択の自由は絶対無制約の権利であり、いかなる規制も許されないと解する。", correct:false, hint:"22条1項も「公共の福祉に反しない限り」という留保のある権利であり、絶対無制約とする規範は誤りです。"}
              ]},
            { instruction:"規範を本件の事実にあてはめる記述として、最も適切なものはどれか？",
              choices:[
                {text:"本問では、薬局の偏在によって不良医薬品の供給の危険が生じるという因果関係は確実な根拠に基づく合理的な判断とは認め難く、距離制限以外のより緩やかな規制（行政上の監督強化等）によっても目的を達成できることから、規制の必要性・合理性を欠く。したがって、本件条例は憲法22条1項に違反し無効である。", correct:true},
                {text:"本問では、薬局開設を規制する目的があるのだから、規制手段の当否を問わず合憲である。", correct:false, hint:"規範で立てた「必要性・合理性」「より緩やかな規制手段の有無」の検討を経ずに、目的の存在だけで結論を出しています。あてはめが規範に対応していません。"},
                {text:"本問では、Xが不許可処分を受けたという結果のみをもって、当然に違憲となる。", correct:false, hint:"不利益処分を受けたという結果だけでは違憲性は基礎づけられません。規制の目的・必要性・手段の相当性を検討する必要があります。"}
              ]}
          ]
        },
        {
          title: "政教分離（津地鎮祭事件型）",
          desc: "地方公共団体主催の神式行事と政教分離原則。",
          facts: "市は、市営体育館の起工式にあたり、神社神道の方式による地鎮祭を挙行し、その費用を公金から支出した。住民Xは、この地鎮祭が憲法20条3項の禁止する「宗教的活動」にあたり、公金支出も89条に違反すると主張した。",
          steps: [
            { instruction:"この事例で、まず何が問題になるかを正しく指摘しているのはどれか？",
              choices:[
                {text:"本件では、市が挙行した神式の地鎮祭が、憲法20条3項が禁止する「宗教的活動」にあたるかが問題となる。", correct:true},
                {text:"本件では、市長個人の信教の自由（憲法20条1項）が侵害されたかが問題となる。", correct:false, hint:"本件は市（地方公共団体）の行為の合憲性が問われる場面であり、市長個人の信教の自由が侵害されたという事案ではありません。"},
                {text:"本件では、神社神道が憲法上の宗教団体に該当するかが問題となる。", correct:false, hint:"神社神道が宗教であること自体は特段争いになっていません。争点は「地鎮祭という行為」が禁止される宗教的活動にあたるかです。"}
              ]},
            { instruction:"問題提起に対応する規範として、最も適切なものはどれか？",
              choices:[
                {text:"政教分離原則は国家と宗教との関わり合いを一切許さないものではなく、その関わり合いが相当とされる限度を超える場合に禁止されると解する。憲法20条3項の「宗教的活動」とは、当該行為の目的が宗教的意義をもち、その効果が宗教に対する援助、助長、促進又は圧迫、干渉等になるような行為をいうと解する（目的効果基準）。", correct:true},
                {text:"国家と宗教は完全に分離されるべきであり、国家がいかなる宗教的行為にも一切関与してはならないと解する。", correct:false, hint:"判例（津地鎮祭事件、最大判昭和52年7月13日）は政教分離を厳格に解さず、社会的・文化的条件に照らし相当とされる限度を超えるかで判断するという、緩やかな理解を採用しています。"},
                {text:"宗教的な儀式が行われた事実さえあれば、当然に憲法20条3項に違反すると解する。", correct:false, hint:"目的効果基準は、外形的な儀式の有無だけでなく、行為の目的と効果を諸般の事情から総合的に判断する枠組みです。外形のみで判断する規範は不正確です。"}
              ]},
            { instruction:"規範を本件の事実にあてはめる記述として、最も適切なものはどれか？",
              choices:[

          <div class="sg-icon">${subj.icon}</div>
          <h3>${subj.name}</h3>
          <div class="sg-count">（${subj.problems.length}事例）</div>
        </div>
        <div class="problem-menu">`;
      subj.problems.forEach((p, pi) => {
        const key = si + '-' + pi;
        html += `
          <div class="problem-card ${done.has(key) ? 'done' : ''}" data-si="${si}" data-pi="${pi}">
            <div class="done-badge">完了</div>
            <div class="p-num">${pi+1}</div>
            <div class="p-info">
              <div class="p-title">${p.title}</div>
              <div class="p-desc">${p.desc}</div>
            </div>
          </div>`;
      });
      html += `</div></div>`;
    });
    mainArea.innerHTML = html;
    document.querySelectorAll('.problem-card').forEach(card => {
      card.addEventListener('click', () => {
        currentSubjectIdx = parseInt(card.dataset.si, 10);
        currentProblemIdx = parseInt(card.dataset.pi, 10);
        stepIdx = 0;
        startTime = Date.now();
        renderBoard();
      });
    });
  }

  function formatTime(ms){
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function currentProblem(){
    return SUBJECTS[currentSubjectIdx].problems[currentProblemIdx];
  }

  function renderBoard(){
    const prob = currentProblem();
    if (stepIdx >= prob.steps.length){
      renderComplete();
      return;
    }
    answered = false;
    wrongAttempted = false;
    const step = prob.steps[stepIdx];

    let blueprintHtml = '<div class="blueprint">';
    const slotLabels = ['問題提起', '規範定立', 'あてはめ'];
    for (let i = 0; i < 3; i++){
      if (i < stepIdx){
        const chosenText = prob.steps[i].choices.find(c => c.correct).text;
        blueprintHtml += `<div class="bp-slot filled"><span class="bp-label">${slotLabels[i]}</span>${chosenText}</div>`;
      } else if (i === stepIdx) {
        blueprintHtml += `<div class="bp-slot" id="activeSlot"><span class="bp-label">${slotLabels[i]}</span>（ここに組み込まれます）</div>`;
      } else {
        blueprintHtml += `<div class="bp-slot"><span class="bp-label">${slotLabels[i]}</span>（未組み立て）</div>`;
      }
    }
    blueprintHtml += '</div>';

    let choicesHtml = '';
    step.choices.forEach((c, idx) => {
      choicesHtml += `<button class="choice-btn" data-idx="${idx}">${c.text}</button>`;
    });

    mainArea.innerHTML = `
      <div class="board">
        <button class="back-link" id="backLink">← 事例一覧に戻る</button>
        <div class="board-head">
          <div>
            <div class="p-tag">${SUBJECTS[currentSubjectIdx].name}｜${prob.title}</div>
            <h2>STEP${stepIdx+1}｜${slotLabels[stepIdx]}</h2>
          </div>
          <div class="timer" id="timerDisplay">00:00</div>
        </div>
        ${stepIdx === 0 ? `<div class="fact-block"><span class="fact-label">事例</span>${prob.facts}</div>` : ''}
        ${blueprintHtml}
        <div class="step-label"><span class="step-num">${stepIdx+1}</span>この争点に対応するパーツを選んでください</div>
        <div class="step-instruction">${step.instruction}</div>
        <div class="choices" id="choicesBox">${choicesHtml}</div>
        <div class="hint-card" id="hintCard">
          <span class="hint-tag">なぜ違うか</span>
          <div id="hintText"></div>
        </div>
      </div>
    `;

    document.getElementById('backLink').addEventListener('click', renderMenu);
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => handleChoice(parseInt(btn.dataset.idx, 10)));
    });

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      document.getElementById('timerDisplay').textContent = formatTime(Date.now() - startTime);
    }, 1000);
  }

  function handleChoice(idx){
    if (answered) return;
    const prob = currentProblem();
    const step = prob.steps[stepIdx];
    const chosen = step.choices[idx];

    if (chosen.correct){
      answered = true;
      document.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === idx) btn.classList.add('correct');
      });
      const activeSlot = document.getElementById('activeSlot');
      const slotLabels = ['問題提起', '規範定立', 'あてはめ'];
      activeSlot.classList.add('filled');
      activeSlot.innerHTML = `<span class="bp-label">${slotLabels[stepIdx]}</span>${chosen.text}`;
      document.getElementById('hintCard').classList.remove('show');
      setTimeout(() => { stepIdx++; renderBoard(); }, 900);
    } else {
      document.querySelectorAll('.choice-btn').forEach((btn, i) => {
        if (i === idx){ btn.classList.add('wrong'); btn.disabled = true; }
      });
      document.getElementById('hintText').innerHTML = chosen.hint;
      document.getElementById('hintCard').classList.add('show');
    }
  }

  function renderComplete(){
    if (timerInterval) clearInterval(timerInterval);
    const key = currentSubjectIdx + '-' + currentProblemIdx;
    done.add(key);
    const prob = currentProblem();
    const elapsed = Date.now() - startTime;

    let faHtml = '';
    const slotLabels = ['① 問題提起', '② 規範定立', '③ あてはめ'];
    prob.steps.forEach((s, i) => {
      const text = s.choices.find(c => c.correct).text;
      faHtml += `<div class="fa-slot"><span class="fa-label">${slotLabels[i]}</span>${text}</div>`;
    });

    mainArea.innerHTML = `
      <div class="board">
        <button class="back-link" id="backLink2">← 事例一覧に戻る</button>
        <div class="complete-screen show">
          <div class="complete-title">完成｜${prob.title}</div>
          <div class="complete-time">組み立て時間：${formatTime(elapsed)}</div>
          <div class="final-answer">${faHtml}</div>
          <button class="next-btn" id="toMenuBtn">他の事例に挑戦する →</button>
        </div>
      </div>
    `;
    document.getElementById('backLink2').addEventListener('click', renderMenu);
    document.getElementById('toMenuBtn').addEventListener('click', renderMenu);
  }

  renderMenu();
})();
</script>

</body>
</html>
